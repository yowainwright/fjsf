name: Test

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Type check
        run: bun run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests with coverage
        run: bun test tests/unit --coverage --coverage-reporter=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build and Install QuickJS
        run: |
          git clone --depth 1 https://github.com/bellard/quickjs /tmp/quickjs
          cd /tmp/quickjs
          make -j$(nproc)
          sudo make install

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build:qjs

      - name: Verify binary
        run: |
          ls -la bin/fjsf-qjs
          file bin/fjsf-qjs

      - name: Run e2e tests
        run: bun run test:e2e

  cli-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build and Install QuickJS
        run: |
          git clone --depth 1 https://github.com/bellard/quickjs /tmp/quickjs
          cd /tmp/quickjs
          make -j$(nproc)
          sudo make install

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build:qjs

      - name: Verify binary
        run: |
          ls -la bin/fjsf-qjs
          file bin/fjsf-qjs

      - name: Test CLI help
        run: ./bin/fjsf-qjs help

      - name: Test CLI version
        run: ./bin/fjsf-qjs --version

      - name: Test CLI quit
        run: ./bin/fjsf-qjs quit

      - name: Test CLI path error on missing file
        run: "! ./bin/fjsf-qjs path nonexistent.json"
